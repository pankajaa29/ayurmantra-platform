version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ayurmeda-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ayurmeda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ayurmeda"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
