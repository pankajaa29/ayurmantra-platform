version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ayurmantra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ayurmantra
      POSTGRES_PASSWORD: ayurmantra123
      POSTGRES_DB: ayurmantra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayurmantra -d ayurmantra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: ayurmantra-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ayurmantra:ayurmantra123@postgres:5432/ayurmantra?schema=public
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/api:/app
      - /app/node_modules
      - /app/dist

  # Public Website
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ayurmantra-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:2600/api/v1
    ports:
      - "2900:3000"
    depends_on:
      - api

  # Patient Portal
  patient-portal:
    build:
      context: ./apps/patient-portal
      dockerfile: Dockerfile
    container_name: ayurmantra-patient-portal
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:2600/api/v1
    ports:
      - "2800:3000"
    depends_on:
      - api

  # Admin Panel
  admin-panel:
    build:
      context: ./apps/admin-panel
      dockerfile: Dockerfile
    container_name: ayurmantra-admin-panel
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:2600/api/v1
    ports:
      - "2700:3000"
    depends_on:
      - api

volumes:
  postgres_data:
