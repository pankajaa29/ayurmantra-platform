version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ayurmantra-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ayurmantra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ayurmantra-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ayurmantra-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ayurmantra-network

  # API Server
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: production
    container_name: ayurmantra-api
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/ayurmantra?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "2600:2600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2600/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ayurmantra-network

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: ayurmantra-web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_WEB_URL: ${WEB_URL}
    ports:
      - "2900:3000"
    depends_on:
      - api
    networks:
      - ayurmantra-network

  # Patient Portal
  patient-portal:
    build:
      context: .
      dockerfile: apps/patient-portal/Dockerfile
      target: production
    container_name: ayurmantra-patient-portal
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
    ports:
      - "2700:3000"
    depends_on:
      - api
    networks:
      - ayurmantra-network

  # Admin Panel
  admin-panel:
    build:
      context: .
      dockerfile: apps/admin-panel/Dockerfile
      target: production
    container_name: ayurmantra-admin-panel
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
    ports:
      - "2800:3000"
    depends_on:
      - api
    networks:
      - ayurmantra-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ayurmantra-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
      - patient-portal
      - admin-panel
      - api
    networks:
      - ayurmantra-network

  # Database Backup Service
  pg-backup:
    image: postgres:16-alpine
    container_name: ayurmantra-backup
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ayurmantra
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_BACKUP_BUCKET}
      AWS_REGION: ${AWS_S3_REGION}
    command: >
      sh -c "
        while true; do
          sleep 86400;
          pg_dump -h postgres -U postgres -d ayurmantra | gzip > /backup/ayurmantra_$(date +%Y%m%d_%H%M%S).sql.gz;
          aws s3 cp /backup/*.sql.gz s3://$$AWS_S3_BUCKET/backups/;
          find /backup -name '*.sql.gz' -mtime +7 -delete;
        done
      "
    volumes:
      - backup_data:/backup
    depends_on:
      - postgres
    networks:
      - ayurmantra-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local

networks:
  ayurmantra-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
